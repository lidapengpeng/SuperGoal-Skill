interface:
  display_name: "SuperGoal"
  short_description: "Plan-first, evidence-gated controller that delegates only validated independent workstreams and verifies their integrated result."
  default_prompt: "Use $supergoal to define the durable outcome and validation evidence. First inspect the task and produce a dependency-aware execution plan. Delegate only genuinely independent workstreams to named SuperGoal roles, use research only for actual evidence gaps, reconcile results, run final validation, and do not claim completion without current evidence."

policy:
  # Heavyweight workflow: only run when explicitly invoked with $supergoal.
  allow_implicit_invocation: false
